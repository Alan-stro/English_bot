name: Daily English Bot

on:
  schedule:
    - cron: '23 0 * * *'  # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:
    inputs:
      topic:
        description: '手动指定话题（留空则 AI 自动选）'
        required: false
        default: ''
      difficulty:
        description: '手动指定难度（留空则 AI 自动，可填 A2/B1/B2/C1/C2）'
        required: false
        default: ''
      feedback:
        description: '对昨天视频的反馈'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - too_easy
          - too_hard

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python main.py
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY:   ${{ secrets.YOUTUBE_API_KEY }}
          QQ_MAIL_USER:      ${{ secrets.QQ_MAIL_USER }}
          QQ_MAIL_PASSWORD:  ${{ secrets.QQ_MAIL_PASSWORD }}
          TO_EMAIL:          ${{ secrets.TO_EMAIL }}
          MANUAL_TOPIC:      ${{ github.event.inputs.topic }}
          MANUAL_DIFFICULTY: ${{ github.event.inputs.difficulty }}
          MANUAL_FEEDBACK:   ${{ github.event.inputs.feedback }}

      - name: Save history
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json config.json
          git add records.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update history $(date +%Y-%m-%d)"
          git push
